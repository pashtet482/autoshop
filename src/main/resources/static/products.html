<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav">
                <a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="categories.html">Категории</a><a href="brands.html">Бренды</a><a href="suppliers.html">Поставщики</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a>
            </nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title">
            <div><h1>Товары</h1><p>Управление каталогом автозапчастей.</p></div>
            <button class="btn" id="createProduct">Добавить товар</button>
        </div>
        <div class="table-wrap">
            <table id="productsTable">
                <thead><tr><th>ID</th><th>Фото</th><th>Название</th><th>Цена</th><th>Категория</th><th>Бренд</th><th>SKU</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination" id="productsPagination"></div>
    </main>
    <div class="modal" id="productEditModal">
        <div class="modal__content">
            <div class="modal__head"><h2 id="productModalTitle">Товар</h2><button class="btn secondary" data-close-modal="productEditModal">Закрыть</button></div>
            <form id="productForm">
                <input id="productId" type="hidden">
                <input name="currentImageUrl" type="hidden">
                <div class="field"><label>Название</label><input name="name" required></div>
                <div class="inline-fields">
                    <div class="field"><label>Цена</label><input name="sellingPrice" type="number" min="0" step="0.01" required></div>
                    <div class="field"><label>SKU</label><input name="sku"></div>
                </div>
                <div class="inline-fields">
                    <div class="field"><label>Категория</label><select id="productCategoryId" name="categoryId" required></select></div>
                    <div class="field"><label>Бренд</label><select id="productBrandId" name="brandId" required></select></div>
                </div>
                <div class="field"><label>OEM номер</label><input name="oemNumber"></div>
                <div class="field"><label>Изображение</label><input name="imageFile" type="file" accept="image/*"></div>
                <div class="field" id="productImagePreview"></div>
                <div class="field">
                    <label>Атрибуты товара</label>
                    <div id="productAttributes"></div>
                    <button class="btn secondary" id="addProductAttribute" type="button">Добавить атрибут</button>
                </div>
                <div class="field"><label>Описание</label><textarea name="description"></textarea></div>
                <button class="btn" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
