<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поставки - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="supplies">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav"><a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="categories.html">Категории</a><a href="brands.html">Бренды</a><a href="suppliers.html">Поставщики</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a></nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title"><div><h1>Поставки</h1><p>Приход товара на склады.</p></div><button class="btn" id="createSupply">Создать поставку</button></div>
        <div class="table-wrap">
            <table id="suppliesTable">
                <thead><tr><th>ID</th><th>Поставщик</th><th>Дата</th><th>Позиций</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination" id="suppliesPagination"></div>
    </main>
    <div class="modal" id="supplyModal">
        <div class="modal__content">
            <div class="modal__head"><h2>Новая поставка</h2><button class="btn secondary" data-close-modal="supplyModal">Закрыть</button></div>
            <form id="supplyForm">
                <div class="inline-fields">
                    <div class="field"><label>Поставщик</label><select id="supplierId" required></select></div>
                    <div class="field"><label>Дата поставки</label><input id="dateOfSupply" type="datetime-local"></div>
                </div>
                <div id="supplyItems"></div>
                <div class="actions"><button class="btn secondary" id="addSupplyItem" type="button">Добавить позицию</button><button class="btn" type="submit">Создать</button></div>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
