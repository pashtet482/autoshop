<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="users">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav"><a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="categories.html">Категории</a><a href="brands.html">Бренды</a><a href="suppliers.html">Поставщики</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a></nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title"><div><h1>Пользователи</h1><p>Раздел доступен только администратору.</p></div><div><button class="btn" id="createUser">Добавить пользователя</button> <button class="btn" id="managePriceLevels">Уровни цен</button></div></div>
        <div class="table-wrap">
            <table id="usersTable">
                <thead><tr><th>Пользователь</th><th>Email</th><th>Телефон</th><th>Роль</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination" id="usersPagination"></div>
    </main>
    <div class="modal" id="userModal">
        <div class="modal__content">
            <div class="modal__head"><h2 id="userModalTitle">Пользователь</h2><button class="btn secondary" data-close-modal="userModal">Закрыть</button></div>
            <form id="userForm">
                <input id="userId" type="hidden">
                <div class="inline-fields">
                    <div class="field"><label>Логин</label><input name="username" required></div>
                    <div class="field" id="passwordField"><label>Пароль</label><input name="password" type="password"></div>
                </div>
                <div class="inline-fields">
                    <div class="field"><label>Email</label><input name="email" type="email" required></div>
                    <div class="field"><label>Телефон</label><input name="phone" required></div>
                </div>
                <div class="field"><label>Компания</label><input name="companyName" required></div>
                <div class="field"><label>Адрес доставки</label><input name="deliveryAddress"></div>
                <div class="inline-fields">
                    <div class="field"><label>Роль</label><select name="role" required><option value="USER">USER</option><option value="ADMIN">ADMIN</option></select></div>
                    <div class="field"><label>Уровень цены</label><select name="priceLevelId" required><option value="">-- Выберите уровень цены --</option></select></div>
                </div>
                <button class="btn" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
