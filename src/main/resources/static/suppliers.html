<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поставщики - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="suppliers">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav"><a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="categories.html">Категории</a><a href="brands.html">Бренды</a><a href="suppliers.html">Поставщики</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a></nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title"><div><h1>Поставщики</h1><p>Справочник поставщиков для поставок.</p></div><button class="btn" id="createSupplier">Добавить поставщика</button></div>
        <div class="table-wrap">
            <table id="suppliersTable">
                <thead><tr><th>ID</th><th>Название</th><th>Телефон</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
    <div class="modal" id="supplierModal">
        <div class="modal__content">
            <div class="modal__head"><h2 id="supplierModalTitle">Поставщик</h2><button class="btn secondary" data-close-modal="supplierModal">Закрыть</button></div>
            <form id="supplierForm">
                <input id="supplierRecordId" type="hidden">
                <div class="field"><label>Название</label><input name="name" required></div>
                <div class="field"><label>Телефон</label><input name="phone" required></div>
                <button class="btn" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
