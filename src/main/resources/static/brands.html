<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бренды - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="brands">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav"><a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="categories.html">Категории</a><a href="brands.html">Бренды</a><a href="suppliers.html">Поставщики</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a></nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title"><div><h1>Бренды</h1><p>Справочник брендов автозапчастей.</p></div><button class="btn" id="createBrand">Добавить бренд</button></div>
        <div class="table-wrap">
            <table id="brandsTable">
                <thead><tr><th>ID</th><th>Название</th><th>Страна</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
    <div class="modal" id="brandModal">
        <div class="modal__content">
            <div class="modal__head"><h2 id="brandModalTitle">Бренд</h2><button class="btn secondary" data-close-modal="brandModal">Закрыть</button></div>
            <form id="brandForm">
                <input id="brandId" type="hidden">
                <div class="field"><label>Название</label><input name="name" required></div>
                <div class="field"><label>Страна</label><input name="country" required></div>
                <button class="btn" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
