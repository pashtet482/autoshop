<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склады - AutoShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="warehouses">
    <header class="header">
        <div class="header__inner">
            <a class="logo" href="index.html"><span class="logo__mark">A</span><span>AutoShop</span></a>
            <nav class="nav"><a href="index.html">Каталог</a><a href="orders.html">Заказы</a><a href="profile.html">Профиль</a><a href="products.html">Товары</a><a href="supplies.html">Поставки</a><a href="warehouses.html">Склады</a><a href="users.html">Пользователи</a></nav>
            <div class="header__actions"><a class="btn secondary cart-button" href="cart.html">Корзина <span data-cart-count hidden>0</span></a><button class="btn ghost" onclick="logout()">Выход</button></div>
        </div>
    </header>
    <main class="page">
        <div class="page-title"><div><h1>Склады</h1><p>Адреса складов и сроки доставки.</p></div><button class="btn" id="createWarehouse">Добавить склад</button></div>
        <div class="table-wrap">
            <table id="warehousesTable">
                <thead><tr><th>ID</th><th>Адрес</th><th>Телефон</th><th>Доставка</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
    <div class="modal" id="warehouseModal">
        <div class="modal__content">
            <div class="modal__head"><h2 id="warehouseModalTitle">Склад</h2><button class="btn secondary" data-close-modal="warehouseModal">Закрыть</button></div>
            <form id="warehouseForm">
                <input id="warehouseId" type="hidden">
                <div class="field"><label>Адрес</label><input name="address" required></div>
                <div class="inline-fields">
                    <div class="field"><label>Телефон</label><input name="phone" required></div>
                    <div class="field"><label>Срок доставки, дней</label><input name="deliveryDays" type="number" min="0" required></div>
                </div>
                <button class="btn" type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
